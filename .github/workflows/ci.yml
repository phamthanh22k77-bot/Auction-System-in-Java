name: Quy trình Tự động hóa CI/CD Java

# Kịch bản tự động chạy khi có Push, Pull Request hoặc gắn Tag phiên bản
on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Lấy mã nguồn từ Repository (Checkout)
      uses: actions/checkout@v4

    - name: Cài đặt môi trường JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Bước 3: Kiểm tra Style Code (Google Style)
    - name: Kiểm tra định dạng mã nguồn (Checkstyle)
      run: |
        cd Source
        mvn checkstyle:check

    # Bước 4: Biên dịch và chạy Unit Test
    - name: Biên dịch và Chạy Unit Test với Maven
      run: |
        cd Source
        mvn clean install -B

    # Bước 5: Lưu trữ artifact tạm thời
    - name: Lưu trữ sản phẩm đóng gói (Archive Artifact)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AuctionSystem-Build-Artifact
        path: Source/target/Auction*.jar

  # JOB MỚI: Tự động tạo Release khi có Tag (v1.0, v1.1...)
  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Lấy mã nguồn từ Repository (Checkout)
      uses: actions/checkout@v4

    - name: Cài đặt môi trường JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Biên dịch và Đóng gói file JAR hoàn chỉnh
      run: |
        cd Source
        mvn clean package -DskipTests

    - name: Tạo bản phát hành GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Source/target/AuctionServer.jar
          Source/target/AuctionClient.jar
        body: "Bản phát hành tự động cho phiên bản ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
