name: Java CI/CD Pipeline

# Kịch bản tự động chạy khi có Push hoặc Pull Request vào nhánh chính
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Sử dụng hệ điều hành Ubuntu mới nhất của GitHub
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy mã nguồn từ GitHub về máy ảo
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Bước 2: Thiết lập môi trường Java 21 (Theo đúng pom.xml của nhóm)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Tự động lưu lại các thư viện đã tải để lần sau build nhanh hơn

    # Bước 3: Biên dịch và chạy Unit Test bên trong thư mục Source
    - name: Build and Run Tests with Maven
      run: |
        cd Source
        mvn clean install -B

    # Bước 4: (Tùy chọn) Lưu trữ file .jar sau khi build thành công làm bằng chứng
    - name: Archive Production Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AuctionSystem-Build-Artifact
        path: Source/target/*.jar
